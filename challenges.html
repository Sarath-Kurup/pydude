<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PYDUDE — Challenges</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{--g:#39ff14;--g2:#22cc0a;--g3:#0d5c04;--g4:#071f02;--bg:#000;--text:#c8f5c0;--muted:#3a6e32;--panel:#050e03;--border:rgba(57,255,20,0.13);}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;overflow-x:hidden;cursor:none;min-height:100vh;}
#cur{position:fixed;pointer-events:none;z-index:9999;width:10px;height:10px;border:1.5px solid var(--g);transform:translate(-50%,-50%);transition:width .08s,height .08s,background .08s;}
#cur.act{width:16px;height:16px;background:rgba(57,255,20,0.1);}
#scan{position:fixed;inset:0;pointer-events:none;z-index:500;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.06) 3px,rgba(0,0,0,0.06) 4px);}
#gc{position:fixed;inset:0;z-index:0;pointer-events:none;}

nav{position:fixed;inset:0 0 auto 0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:50px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.88);backdrop-filter:blur(6px);}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:17px;color:var(--g);letter-spacing:.1em;text-decoration:none;}
.logo sup{font-size:8px;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.2em;vertical-align:super;margin-left:3px;}
.nav-tabs{display:flex;gap:2px;}
.nav-tab{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:6px 16px;border:1px solid transparent;color:var(--muted);text-decoration:none;transition:all .15s;cursor:none;}
.nav-tab:hover,.nav-tab.on{border-color:var(--border);color:var(--g);background:rgba(57,255,20,0.04);}
.nav-right{display:flex;align-items:center;gap:16px;}
.sys-badge{font-family:'DM Mono',monospace;font-size:9px;color:var(--g3);letter-spacing:.15em;}
.sys-badge b{color:var(--g2);font-weight:400;}
.blink-dot{width:6px;height:6px;border-radius:50%;background:var(--g);animation:blink 1.2s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

#page{position:relative;z-index:10;padding:80px 48px 60px;}

/* header */
.pg-kicker{font-family:'DM Mono',monospace;font-size:9px;color:var(--g3);letter-spacing:.35em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.pg-kicker::before{content:'';display:block;width:28px;height:1px;background:var(--g3);}
.pg-h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(28px,4vw,48px);color:#fff;letter-spacing:.02em;mix-blend-mode:difference;margin-bottom:40px;line-height:.95;}
.pg-h1 em{color:var(--g);font-style:normal;}

/* stats strip */
.stats-strip{display:grid;grid-template-columns:repeat(4,auto);gap:0;border:1px solid var(--border);margin-bottom:40px;width:fit-content;}
.strip-stat{padding:14px 28px;border-right:1px solid var(--border);text-align:center;}
.strip-stat:last-child{border-right:none;}
.strip-num{font-family:'Orbitron',sans-serif;font-weight:900;font-size:20px;color:var(--g);line-height:1;}
.strip-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-top:4px;}

/* filters */
.filters{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap;align-items:center;}
.filter-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--g3);letter-spacing:.2em;text-transform:uppercase;margin-right:4px;}
.filter-btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;padding:5px 14px;border:1px solid var(--border);color:var(--muted);background:transparent;cursor:none;transition:all .15s;}
.filter-btn:hover{border-color:var(--g3);color:var(--text);}
.filter-btn.on{border-color:var(--g);color:var(--g);background:rgba(57,255,20,0.05);}
.filter-sep{width:1px;height:20px;background:var(--border);margin:0 4px;}

/* challenge grid */
#challenge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);}

.ch-card{
  background:#000;padding:28px 24px;
  cursor:none;transition:background .15s;
  position:relative;text-decoration:none;
  display:flex;flex-direction:column;gap:12px;
}
.ch-card:hover{background:rgba(57,255,20,0.04);}
.ch-card.solved{background:rgba(57,255,20,0.02);}

.ch-card-top{display:flex;align-items:center;gap:10px;}
.ch-num{font-family:'DM Mono',monospace;font-size:10px;color:var(--g3);letter-spacing:.1em;min-width:28px;}
.ch-diff-badge{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;padding:2px 8px;border:1px solid;}
.ch-diff-badge.easy{border-color:var(--g3);color:var(--g2);}
.ch-diff-badge.medium{border-color:#cc8800;color:#ffcc00;}
.ch-diff-badge.hard{border-color:#cc2200;color:#ff5555;}
.ch-solved-mark{margin-left:auto;font-size:10px;color:var(--g);font-family:'DM Mono',monospace;letter-spacing:.1em;}

.ch-title-text{font-family:'Orbitron',sans-serif;font-weight:700;font-size:13px;color:#fff;letter-spacing:.06em;}
.ch-desc-preview{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);line-height:1.8;letter-spacing:.04em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

.ch-tags{display:flex;gap:6px;flex-wrap:wrap;}
.ch-tag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.15em;text-transform:uppercase;padding:2px 8px;border:1px solid var(--g4);color:var(--g3);}

.ch-footer{display:flex;align-items:center;gap:12px;margin-top:4px;}
.ch-score-bar-wrap{flex:1;height:2px;background:rgba(57,255,20,0.1);}
.ch-score-bar{height:100%;background:var(--g);transition:width .3s;}
.ch-score-text{font-family:'DM Mono',monospace;font-size:9px;color:var(--g3);letter-spacing:.1em;white-space:nowrap;}
.ch-arrow{font-size:14px;color:var(--g3);transition:color .15s;}
.ch-card:hover .ch-arrow{color:var(--g);}

/* empty state */
#empty-state{display:none;padding:60px;text-align:center;grid-column:1/-1;}
#empty-state p{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:.1em;}
</style>
</head>
<body>
<div id="scan"></div>
<div id="cur"></div>
<canvas id="gc"></canvas>

<nav>
  <a class="logo" href="index.html">PYDUDE<sup>beta</sup></a>
  <div class="nav-tabs">
    <a class="nav-tab" href="index.html">Home</a>
    <a class="nav-tab" href="pydude_playground.html">Playground</a>
    <a class="nav-tab on" href="#">Challenges</a>
    <a class="nav-tab" href="docs.html">Docs</a>
    <a class="nav-tab gate-link" href="comm.html">Community</a>

  </div>
  <div class="nav-right">
    <div class="sys-badge">TRACK <b id="progress-text">0 / 50 solved</b></div>
    <div class="blink-dot"></div>
  </div>
</nav>

<div id="page">
  <div class="pg-kicker">// challenge bank · v1</div>
  <h1 class="pg-h1">PICK YOUR<br><em>CHALLENGE</em></h1>

  <div class="stats-strip">
    <div class="strip-stat"><div class="strip-num" id="stat-total">50</div><div class="strip-label">total</div></div>
    <div class="strip-stat"><div class="strip-num" id="stat-solved">0</div><div class="strip-label">solved</div></div>
    <div class="strip-stat"><div class="strip-num" id="stat-score">0</div><div class="strip-label">total score</div></div>
    <div class="strip-stat"><div class="strip-num" id="stat-streak">0</div><div class="strip-label">streak</div></div>
  </div>

  <div class="filters">
    <span class="filter-label">difficulty</span>
    <button class="filter-btn on" data-filter="all">all</button>
    <button class="filter-btn" data-filter="easy">easy</button>
    <button class="filter-btn" data-filter="medium">medium</button>
    <button class="filter-btn" data-filter="hard">hard</button>
    <div class="filter-sep"></div>
    <span class="filter-label">status</span>
    <button class="filter-btn" data-filter="unsolved">unsolved</button>
    <button class="filter-btn" data-filter="solved">solved</button>
  </div>

  <div id="challenge-grid">
    <div id="empty-state"><p>// no challenges match filter</p></div>
  </div>
</div>

<script>
// pixel grid
const gc=document.getElementById('gc'),gctx=gc.getContext('2d');
const CELL=26,SYMS=['+','-','.','+','.','+','-','.'];
let gW,gH,gcols,grows,gblocks;
function gResize(){gW=gc.width=window.innerWidth;gH=gc.height=window.innerHeight;gcols=Math.ceil(gW/CELL)+1;grows=Math.ceil(gH/CELL)+1;gblocks=[];for(let r=0;r<grows;r++)for(let c=0;c<gcols;c++)gblocks.push({x:c*CELL,y:r*CELL,sym:SYMS[(r*5+c*3)%SYMS.length],bri:0,tgt:0});}
document.addEventListener('mousemove',e=>{const mx=e.clientX,my=e.clientY;gblocks.forEach(b=>{const d=Math.hypot(b.x+CELL*.5-mx,b.y+CELL*.5-my);b.tgt=d<100?Math.pow(1-d/100,1.7):0;});});
document.addEventListener('mouseleave',()=>gblocks.forEach(b=>b.tgt=0));
function gDraw(){gctx.clearRect(0,0,gW,gH);gblocks.forEach(b=>{b.bri+=(b.tgt-b.bri)*0.13;const v=b.bri;if(v<0.015)return;const px=b.x,py=b.y,pad=3,bw=CELL-pad*2,bh=CELL-pad*2;gctx.fillStyle=`rgb(${Math.floor(v*255)},${Math.floor(v*255)},${Math.floor(v*255)})`;gctx.fillRect(px+pad,py+pad,bw,bh);const ba=v<0.6?v*.85:(1-v)*.85;gctx.strokeStyle=`rgba(57,255,20,${ba})`;gctx.lineWidth=0.7;gctx.strokeRect(px+pad+.5,py+pad+.5,bw-1,bh-1);gctx.fillStyle=v>0.55?`rgba(${Math.floor((1-v)*60)},${Math.floor((1-v)*60)},${Math.floor((1-v)*60)},0.7)`:`rgba(57,255,20,${v*.9+.08})`;gctx.font=`${b.sym==='.'?9:10}px 'Share Tech Mono',monospace`;gctx.textAlign='center';gctx.textBaseline='middle';gctx.fillText(b.sym,px+CELL*.5,py+CELL*.5);});requestAnimationFrame(gDraw);}
window.addEventListener('resize',gResize);gResize();gDraw();
const cur=document.getElementById('cur');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});

// ── CHALLENGES ──────────────────────────────────────
let challenges = [];
let activeFilter = 'all';

// Load scores from localStorage
function getProgress() {
  try { return JSON.parse(localStorage.getItem('pydude_progress') || '{}'); } catch { return {}; }
}

async function loadChallenges() {
  try {
    const r = await fetch('challenges.json');
    challenges = await r.json();
    const progress = getProgress();
    // merge saved progress
    challenges.forEach(ch => {
      if (progress[ch.id]) {
        ch.score = progress[ch.id].score || 0;
        ch.solved = progress[ch.id].solved || false;
      }
    });
    updateStats();
    renderCards(challenges);
  } catch(e) {
    document.getElementById('challenge-grid').innerHTML =
      `<div id="empty-state" style="display:block"><p>// could not load challenges.json<br>make sure you're running from a local server</p></div>`;
  }
}

function updateStats() {
  const solved = challenges.filter(c => c.solved).length;
  const totalScore = challenges.reduce((a,c) => a+c.score, 0);
  document.getElementById('stat-solved').textContent = solved;
  document.getElementById('stat-score').textContent = totalScore;
  document.getElementById('progress-text').textContent = `${solved} / ${challenges.length} solved`;

  // streak = consecutive solved from id 1
  let streak = 0;
  for (const ch of [...challenges].sort((a,b)=>a.id-b.id)) {
    if (ch.solved) streak++; else break;
  }
  document.getElementById('stat-streak').textContent = streak;
}

function renderCards(list) {
  const grid = document.getElementById('challenge-grid');
  grid.innerHTML = '';

  const filtered = list.filter(ch => {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'solved') return ch.solved;
    if (activeFilter === 'unsolved') return !ch.solved;
    return ch.difficulty === activeFilter;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div id="empty-state" style="display:block;padding:60px;text-align:center;grid-column:1/-1"><p style="font-family:DM Mono,monospace;font-size:12px;color:var(--muted);letter-spacing:.1em">// no challenges match filter</p></div>';
    return;
  }

  filtered.forEach(ch => {
    const pct = ch.score;
    const card = document.createElement('a');
    card.className = `ch-card${ch.solved?' solved':''}`;
    card.href = `pydude_playground.html?id=${ch.id}`;
    card.innerHTML = `
      <div class="ch-card-top">
        <span class="ch-num">#${String(ch.id).padStart(3,'0')}</span>
        <span class="ch-diff-badge ${ch.difficulty}">${ch.difficulty}</span>
        ${ch.solved ? '<span class="ch-solved-mark">✓ SOLVED</span>' : ''}
      </div>
      <div class="ch-title-text">${ch.title}</div>
      <div class="ch-desc-preview">${ch.description.split('\n')[0]}</div>
      <div class="ch-tags">${ch.tags.map(t=>`<span class="ch-tag">${t}</span>`).join('')}</div>
      <div class="ch-footer">
        <div class="ch-score-bar-wrap"><div class="ch-score-bar" style="width:${pct}%"></div></div>
        <span class="ch-score-text">${pct}/100</span>
        <span class="ch-arrow">→</span>
      </div>`;
    grid.appendChild(card);
  });

  // cursor hover
  grid.querySelectorAll('.ch-card').forEach(el=>{
    el.addEventListener('mouseenter',()=>cur.classList.add('act'));
    el.addEventListener('mouseleave',()=>cur.classList.remove('act'));
  });
}

// filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    activeFilter = btn.dataset.filter;
    renderCards(challenges);
  });
});

document.querySelectorAll('a,.filter-btn,.nav-tab').forEach(el=>{
  el.addEventListener('mouseenter',()=>cur.classList.add('act'));
  el.addEventListener('mouseleave',()=>cur.classList.remove('act'));
});

loadChallenges();
</script>
</body>
</html>
